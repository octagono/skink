# Skink lint configuration
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - gosimple

linters-settings:
  errcheck:
    exclude-functions:
      - io.Copy
      - io.CopyBuffer
      - (net.Conn).Close
      - (net.Listener).Close
  staticcheck:
    checks: ["all"]

issues:
  exclude-rules:
    # Test files can have unchecked errors
    - path: _test\.go
      linters:
        - errcheck
    # Close in defer/goroutine is intentionally unchecked
    - source: "^\\s*defer.*Close\\(\\)"
      linters:
        - errcheck
    - source: "go func\\(\\).*\\n.*\\.Close\\(\\)"
      linters:
        - errcheck
